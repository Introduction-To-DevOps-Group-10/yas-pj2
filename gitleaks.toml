# ============================================================
# Gitleaks Configuration — YAS Project
# Gitleaks kiểm tra secrets trong repository.
# Các file trong allowlist sẽ bị BỎ QUA (không báo lỗi).
# ============================================================
title = "YAS Project — Gitleaks Allowlist"

# Kế thừa tất cả rules mặc định của gitleaks
# https://github.com/zricethezav/gitleaks/blob/master/config/gitleaks.toml
[extend]
useDefault = true

# ============================================================
# ALLOWLIST — Files & Secrets bỏ qua kiểm tra
# ============================================================
[allowlist]
description = """
YAS Development Secrets Allowlist

LÝ DO CHO PHÉP:
- application.properties (src/main/resources): chứa keycloak credentials
  dùng trong MÔI TRƯỜNG PHÁT TRIỂN CỤC BỘ (localhost).
  KHÔNG bao gồm production credentials thật.
- application.properties (src/it/resources): integration test file,
  không bao giờ chạy trong môi trường production.
- test-realm.json: Keycloak test realm cho unit/integration tests.
- realm-export.json: Keycloak realm export — dùng trong docker-compose dev.
- keycloak-yas-realm-import.yaml: Helm chart Keycloak import template.
- changelog-*.sql: chứa test PayPal client credentials (sandbox/fake).
- cluster-config.yaml: chứa Elasticsearch dev password cho local cluster.
  Thay thế bằng Kubernetes Secret trong CI/CD.
- yas-configuration/values.yaml: chứa client secrets cho Keycloak clients.
  Dùng trong dev environment. Thay thế bằng external secrets manager.
"""

# ─── File paths bỏ qua hoàn toàn ────────────────────────
paths = [
  # Keycloak realm files (dùng trong dev)
  '''test-realm.json''',
  '''realm-export''',
  '''keycloak-yas-realm-import.yaml''',

  # Maven/Jenkins build output
  '''target/''',

  # Source code test files chứa test credentials
  '''application.properties''',           # Keycloak dev credentials
  '''test-realm''',                     # Realm JSON files
  '''realm-export''',                   # Keycloak export
  '''changelog''',                      # DB changelog SQL (PayPal sandbox)
  '''yas-configuration/values.yaml''',  # Dev client secrets trong Helm values
  '''cluster-config.yaml''',            # Dev Elasticsearch password
]

